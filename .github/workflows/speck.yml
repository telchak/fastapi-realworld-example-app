# Spec-Driven Development with Speck
# Triggers when a GitHub issue is labeled "speck".
# Decomposes the issue and posts the structured JSON result as a comment.

name: Spec-Driven Development

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  decompose:
    if: github.event.label.name == 'speck'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dagger CLI
        uses: dagger/dagger-for-github@v8
        with:
          verb: version

      - name: Decompose issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-opus-4-6
        run: |
          dagger call -m github.com/telchak/daggerverse/speck@feat/speck \
            --source=. \
            decompose \
            --issue-id=${{ github.event.issue.number }} \
            --repository="https://github.com/${{ github.repository }}" \
            --github-token=env:GITHUB_TOKEN \
            --create-pr \
            --include-tests \
            --include-review \
            --agents='[{"name":"monty","source":"github.com/telchak/daggerverse/monty","specialization":"Python backend development","capabilities":["assist","review","write_tests","build","upgrade"]}]' \
            --tech-stack="Python, FastAPI, PostgreSQL" \
            > /tmp/speck.json

          TASKS=$(jq '.total_tasks' /tmp/speck.json)
          PHASES=$(jq '.execution_plan.total_phases' /tmp/speck.json)
          PRETTY=$(jq '.' /tmp/speck.json)

          gh issue comment "${{ github.event.issue.number }}" \
            --body "## Speck Decomposition Complete

          **Tasks**: ${TASKS} | **Phases**: ${PHASES}

          <details><summary>Full JSON</summary>

          \`\`\`json
          ${PRETTY}
          \`\`\`
          </details>"
